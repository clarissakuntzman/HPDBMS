<!DOCTYPE html>
<html>
<head>
    <title>HPDBMS Add Appointment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="topnav">
    <div class="logo">HPDBMS</div>
    <div class="links">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('patients') }}">Patients</a>
        <a href="{{ url_for('appointments') }}">Appointments</a>
        <a href="{{ url_for('analytics') }}">Analytics</a>
        <a href="/">Logout</a>
    </div>
</div>

<div class="container">
<h2>Create New Appointment</h2>

<form method="POST" action="/add_appointment">

  <select name="patient_id" required>
    {% for p in patients %}
      <option value="{{ p.patient_id }}">
        {{ p.first_name }} {{ p.last_name }} ({{ p.patient_id }})
      </option>
    {% endfor %}
  </select>

  <input type="date" name="date" required>
  <input type="time" name="time" required>

  <button>Create New Appointment</button>
</form>

</div>
</body>
</html>
