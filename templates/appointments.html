<!DOCTYPE html>
<html>
<head>
    <title>HPDBMS Appointments</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="topnav">
    <div class="logo">HPDBMS</div>
    <div class="links">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('patients') }}">Patients</a>
        <a href="{{ url_for('appointments') }}">Appointments</a>
        <a href="{{ url_for('analytics') }}">Analytics</a>
        <a href="/">Logout</a>
    </div>
</div>

<div class="container">
<h2>Appointments</h2>

<a href="{{ url_for('add_appointment_page') }}">
  <button>Create New Appointment</button>
</a>

<table>
  <tr>
    <th>Patient</th>
    <th>Patient ID</th>
    <th>Date</th>
    <th>Time</th>
    <th>Actions</th>
  </tr>

  {% for a in appointments %}
  <tr>
    <td>{{ a.first_name }} {{ a.last_name }}</td>
    <td>{{ a.patient_id }}</td>
    <td>{{ a.date }}</td>
    <td>{{ a.time }}</td>
    <td>
      {% if role == 'admin' %}
        <a href="/edit_appointment/{{ a.id }}">Edit</a>
        <a href="/delete_appointment/{{ a.id }}">Delete</a>
      {% endif %}
    </td>
  </tr>
  {% endfor %}
</table>

</div>
</body>
</html>
